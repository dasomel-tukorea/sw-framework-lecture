<!-- [복사 위치] src/main/resources/templates/student/list.html -->
<!-- [작업] Week 11 lab03 — 블록 페이징 UI (lab01 의 list.html 을 본 파일 내용으로 교체) -->
<!--
    학습 포인트:
    - #numbers.sequence(page.startPage, page.endPage) — 현재 블록의 페이지 번호만 렌더
    - « (prevBlock) / » (nextBlock) 화살표로 10페이지 단위 점프
    - 검색·정렬 querystring 을 모든 링크에서 보존
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>학생 목록 — 블록 페이징</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="container">
    <h1>학생 관리</h1>

    <!-- 검색 폼 (검색 시 page=1, 정렬은 hidden 으로 유지) -->
    <form class="search-box" th:action="@{/students}" method="get">
        <select name="searchType">
            <option value="name"       th:selected="${page.searchType == 'name'}">이름</option>
            <option value="student_id" th:selected="${page.searchType == 'student_id'}">학번</option>
            <option value="email"      th:selected="${page.searchType == 'email'}">이메일</option>
            <option value="major"      th:selected="${page.searchType == 'major'}">전공</option>
        </select>
        <input type="text" name="keyword" th:value="${page.keyword}" placeholder="검색어 입력"/>
        <input type="hidden" name="sortBy" th:value="${page.sortBy}"/>
        <input type="hidden" name="page" value="1"/>
        <button type="submit" class="btn">검색</button>
    </form>

    <a th:href="@{/students/new}" class="btn btn-primary">+ 새 학생 등록</a>

    <br><br>

    <!-- 학생 목록 테이블 -->
    <table th:if="${!#lists.isEmpty(students)}">
        <thead>
            <tr>
                <th style="width:60px;">번호</th>
                <th style="width:120px;">학번</th>
                <th>이름</th>
                <th>이메일</th>
                <th style="width:140px;">전공</th>
                <th style="width:120px;">등록일</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}">1</td>
                <td th:text="${student.studentId}">202300001</td>
                <td style="text-align:left;">
                    <a th:href="@{/students/{id}(id=${student.id})}"
                       th:text="${student.name}">홍길동</a>
                </td>
                <td th:text="${student.email ?: '-'}">hong@tukorea.ac.kr</td>
                <td th:text="${student.major ?: '-'}">IT경영전공</td>
                <td th:text="${student.createdAt != null}
                              ? ${#temporals.format(student.createdAt, 'yyyy-MM-dd')}
                              : '-'">2026-01-01</td>
            </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(students)}" class="empty-msg">등록된 학생이 없습니다.</p>

    <!-- ========================================== -->
    <!-- 블록 페이징 네비게이션 (Week 11 lab03)        -->
    <!-- ========================================== -->
    <div class="pagination" th:if="${page.totalPages > 0}">

        <!-- 이전 블록 (« — 10페이지 점프, 이전 블록의 마지막 페이지로 이동) -->
        <a th:if="${page.hasPrevBlock()}"
           th:href="@{/students(page=${page.prevBlockPage}, size=${page.size},
                                searchType=${page.searchType}, keyword=${page.keyword},
                                sortBy=${page.sortBy})}">
            &laquo; 이전
        </a>
        <span th:unless="${page.hasPrevBlock()}" class="disabled">&laquo; 이전</span>

        <!--
            블록 내 페이지 번호 (startPage ~ endPage 만 렌더)
            #numbers.sequence(start, end) 는 [start, end] 폐구간을 생성한다.
        -->
        <th:block th:each="i : ${#numbers.sequence(page.startPage, page.endPage)}">
            <span th:if="${i == page.page}" class="active current" th:text="${i}">1</span>
            <a th:unless="${i == page.page}"
               th:href="@{/students(page=${i}, size=${page.size},
                                    searchType=${page.searchType}, keyword=${page.keyword},
                                    sortBy=${page.sortBy})}"
               th:text="${i}">1</a>
        </th:block>

        <!-- 다음 블록 (» — 10페이지 점프, 다음 블록의 첫 페이지로 이동) -->
        <a th:if="${page.hasNextBlock()}"
           th:href="@{/students(page=${page.nextBlockPage}, size=${page.size},
                                searchType=${page.searchType}, keyword=${page.keyword},
                                sortBy=${page.sortBy})}">
            다음 &raquo;
        </a>
        <span th:unless="${page.hasNextBlock()}" class="disabled">다음 &raquo;</span>
    </div>

    <p class="page-info"
       th:text="'전체 ' + ${page.totalCount} + '명 | ' + ${page.page} + '/' + ${page.totalPages} + ' 페이지'">
    </p>
</div>

</body>
</html>
