# application.yml — Week 11 애플리케이션 전체 설정
# Week 11 — MVC 실습 #2 — 페이징 처리 + 파일 업로드
# 경로: src/main/resources/application.yml

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/swframework?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  thymeleaf:
    cache: false  # 개발 중 템플릿 변경 즉시 반영
  servlet:
    multipart:
      max-file-size: 10MB       # 파일 1개 최대 크기
      max-request-size: 20MB   # 요청 전체 최대 크기

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: kr.ac.tukorea.swframework.dto
  configuration:
    map-underscore-to-camel-case: true  # DB: created_at → Java: createdAt 자동 변환

# 파일 업로드 저장 경로 (커스텀 프로퍼티)
file:
  upload-dir: ./uploads
