<!-- form.html — 학생 등록/수정 폼 -->
<!-- Week 09 — MyBatis CRUD -->
<!-- 경로: src/main/resources/templates/student/form.html -->
<!--
    학습 포인트:
    1. th:action — Form 전송 URL 지정 (@{} 링크 표현식)
    2. th:value — 기존 데이터를 input에 바인딩
    3. 조건 분기 — student 객체 유무로 등록/수정 구분
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>학생 등록/수정</title>
</head>
<body>
    <h1>학생 등록</h1>

    <!--
        등록: POST /students
        수정: POST /students/{id}
        method="post" — HTTP POST 전송 (PRG 패턴 적용)
        th:action — student.id 유무로 등록/수정 URL 분기
    -->
    <form method="post"
          th:action="${student != null && student.id != null}
                      ? @{/students/{id}(id=${student.id})}
                      : @{/students}">

        <label>이름:
            <input type="text" name="name" th:value="${student?.name}" required/>
        </label><br><br>

        <label>이메일:
            <input type="email" name="email" th:value="${student?.email}" required/>
        </label><br><br>

        <label>전공:
            <input type="text" name="major" th:value="${student?.major}"/>
        </label><br><br>

        <button type="submit">저장</button>
        <a th:href="@{/students}">취소</a>
    </form>
</body>
</html>
